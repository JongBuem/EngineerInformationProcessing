<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>정보처리기사 알고리즘 풀이 노트</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Gowun+Batang:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1208;
        --paper: #f5f0e8;
        --aged: #e8dfc8;
        --line: #c8b89a;
        --accent: #8b3a0f;
        --accent2: #2d5a3d;
        --accent3: #1e3a6e;
        --highlight: #f0c060;
        --code-bg: #1a1208;
        --code-fg: #e8d5b0;
        --java-color: #f78c6c;
        --c-color: #82aaff;
        --python-color: #c3e88d;
        --essay-color: #e2b4f0;
        --short-color: #ffd580;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Gowun Batang", serif;
        min-height: 100vh;
        background-image: repeating-linear-gradient(
          0deg, transparent, transparent 31px,
          var(--line) 31px, var(--line) 32px
        );
        background-attachment: fixed;
      }
      .page {
        max-width: 1000px;
        margin: 0 auto;
        padding: 60px 40px;
        position: relative;
      }
      .page::before {
        content: "";
        position: fixed;
        left: calc(50% - 500px + 72px);
        top: 0; bottom: 0;
        width: 2px;
        background: rgba(192, 57, 43, 0.35);
        pointer-events: none;
      }

      /* ── 헤더 ── */
      .header {
        padding-left: 48px;
        margin-bottom: 36px;
        animation: fadeSlide 0.6s ease both;
      }
      .header .label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        letter-spacing: 0.25em;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 8px;
        opacity: 0.8;
      }
      .header h1 {
        font-family: "Noto Serif KR", serif;
        font-size: 28px;
        font-weight: 700;
        color: var(--ink);
        line-height: 1.3;
        border-bottom: 3px double var(--accent);
        padding-bottom: 12px;
        display: inline-block;
      }
      .header .meta {
        margin-top: 10px;
        font-size: 13px;
        color: #7a6650;
        font-family: "JetBrains Mono", monospace;
      }

      /* ── 통계 카드 ── */
      .stats-row {
        padding-left: 48px;
        display: flex;
        gap: 14px;
        margin-bottom: 36px;
        flex-wrap: wrap;
        animation: fadeSlide 0.6s ease 0.1s both;
      }
      .stat-card {
        background: rgba(255,255,255,0.55);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px 22px;
        text-align: center;
        min-width: 100px;
        flex: 1;
      }
      .stat-card .s-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 26px;
        font-weight: 700;
        color: var(--accent);
      }
      .stat-card .s-label {
        font-size: 11px;
        color: #7a6650;
        margin-top: 2px;
        letter-spacing: 0.05em;
      }

      /* ── 컨트롤 바 ── */
      .controls {
        padding-left: 48px;
        margin-bottom: 28px;
        animation: fadeSlide 0.6s ease 0.15s both;
      }

      /* 탭 */
      .tab-bar {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-bottom: 18px;
        border-bottom: 2px solid var(--line);
        padding-bottom: 10px;
      }
      .tab-btn {
        padding: 7px 16px;
        border: 1px solid var(--line);
        border-radius: 6px 6px 0 0;
        background: var(--aged);
        font-family: "Noto Serif KR", serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        color: #7a6650;
        transition: all 0.15s;
        letter-spacing: 0.03em;
      }
      .tab-btn:hover { background: rgba(139,58,15,0.08); color: var(--accent); }
      .tab-btn.active {
        background: var(--accent);
        color: var(--paper);
        border-color: var(--accent);
      }

      /* 검색 + 필터 행 */
      .filter-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
      }
      .search-box {
        flex: 1;
        min-width: 200px;
        padding: 9px 14px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255,255,255,0.7);
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        color: var(--ink);
        outline: none;
      }
      .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(139,58,15,0.1); }
      .filter-select {
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: rgba(255,255,255,0.7);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: var(--ink);
        cursor: pointer;
        outline: none;
      }
      .filter-select:focus { border-color: var(--accent); }

      /* 랜덤 버튼 */
      .btn-random {
        padding: 9px 20px;
        border: 2px solid var(--accent);
        border-radius: 6px;
        background: var(--ink);
        color: var(--highlight);
        font-family: "Noto Serif KR", serif;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.15s;
        white-space: nowrap;
        box-shadow: 2px 3px 0 rgba(0,0,0,0.15);
      }
      .btn-random:hover { opacity: 0.85; }
      .btn-random:active { transform: translateY(1px); box-shadow: 1px 1px 0 rgba(0,0,0,0.15); }

      /* ── 문제 목록 ── */
      .list-header {
        padding-left: 48px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        color: #7a6650;
        animation: fadeSlide 0.6s ease 0.2s both;
      }
      .problem-list {
        padding-left: 48px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        animation: fadeSlide 0.6s ease 0.2s both;
      }

      /* 그룹 헤더 */
      .group-header {
        font-family: "Noto Serif KR", serif;
        font-size: 14px;
        font-weight: 700;
        color: var(--accent);
        padding: 10px 0 6px;
        border-bottom: 1px solid var(--aged);
        margin-top: 8px;
        letter-spacing: 0.08em;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .group-header .g-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        background: var(--aged);
        padding: 2px 8px;
        border-radius: 10px;
        color: #7a6650;
      }

      /* 문제 카드 */
      .problem-item {
        display: flex;
        align-items: center;
        gap: 14px;
        background: rgba(255,255,255,0.5);
        border: 1px solid var(--line);
        border-left: 4px solid var(--accent);
        border-radius: 0 6px 6px 0;
        padding: 14px 20px;
        text-decoration: none;
        color: var(--ink);
        transition: all 0.15s;
        box-shadow: 2px 2px 0 rgba(0,0,0,0.04);
        cursor: pointer;
      }
      .problem-item:hover {
        border-left-color: var(--highlight);
        background: rgba(255,255,255,0.85);
        transform: translateX(2px);
        box-shadow: 4px 4px 0 rgba(0,0,0,0.08);
      }
      .problem-item.lang-c { border-left-color: var(--c-color); }
      .problem-item.lang-p { border-left-color: var(--python-color); }
      .problem-item.lang-essay { border-left-color: var(--essay-color); }
      .problem-item.lang-short { border-left-color: var(--short-color); }

      .p-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #a09070;
        min-width: 28px;
      }
      .p-lang-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 4px;
        min-width: 52px;
        text-align: center;
        flex-shrink: 0;
      }
      .badge-j { background: rgba(247,140,108,0.18); color: #c4622a; border: 1px solid rgba(247,140,108,0.4); }
      .badge-c { background: rgba(130,170,255,0.18); color: #2d5aaa; border: 1px solid rgba(130,170,255,0.4); }
      .badge-p { background: rgba(195,232,141,0.2); color: #3a6a20; border: 1px solid rgba(195,232,141,0.4); }
      .badge-essay { background: rgba(226,180,240,0.2); color: #7a30a0; border: 1px solid rgba(226,180,240,0.4); }
      .badge-short { background: rgba(255,213,128,0.2); color: #a06010; border: 1px solid rgba(255,213,128,0.4); }

      .p-type-badge {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .type-programming { background: rgba(30,58,110,0.1); color: var(--accent3); border: 1px solid rgba(30,58,110,0.2); }
      .type-essay { background: rgba(226,180,240,0.2); color: #7a30a0; border: 1px solid rgba(226,180,240,0.3); }
      .type-short { background: rgba(255,213,128,0.2); color: #a06010; border: 1px solid rgba(255,213,128,0.3); }

      .p-info { flex: 1; min-width: 0; }
      .p-title {
        font-family: "Noto Serif KR", serif;
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .p-subtitle {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #a09070;
        margin-top: 3px;
      }
      .p-meta {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #a09070;
        white-space: nowrap;
        text-align: right;
        flex-shrink: 0;
      }
      .p-arrow {
        color: #c8b89a;
        font-size: 14px;
        flex-shrink: 0;
      }

      /* 빈 상태 */
      .empty-state {
        padding: 48px 0;
        text-align: center;
        color: #a09070;
        font-family: "JetBrains Mono", monospace;
        font-size: 13px;
        animation: fadeSlide 0.4s ease both;
      }

      /* ── 다음문제 네비게이션 (문제 페이지 하단에 삽입 예정) ── */
      /* ── 푸터 ── */
      .footer {
        padding-left: 48px;
        margin-top: 60px;
        padding-top: 20px;
        border-top: 1px solid var(--aged);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #a09070;
        animation: fadeSlide 0.6s ease 0.3s both;
      }

      /* ── 클릭 가능한 통계 카드 ── */
      .stat-card.clickable {
        cursor: pointer;
        transition: all 0.15s;
      }
      .stat-card.clickable:hover {
        border-color: var(--accent);
        background: rgba(139,58,15,0.07);
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(0,0,0,0.08);
      }
      .stat-card.clickable.active {
        border-color: var(--accent);
        background: rgba(139,58,15,0.1);
        box-shadow: 0 0 0 2px rgba(139,58,15,0.25);
      }
      .stat-card.clickable.active .s-label {
        color: var(--accent);
        font-weight: 700;
      }

      /* ── 학습 자료 섹션 ── */
      .learning-section {
        padding-left: 48px;
        margin-bottom: 32px;
        animation: fadeSlide 0.6s ease 0.12s both;
      }
      .learning-header {
        font-family: "Noto Serif KR", serif;
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.08em;
        margin-bottom: 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--aged);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .learning-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
      }
      .learn-col {
        background: rgba(255,255,255,0.4);
        border: 1px solid var(--line);
        border-radius: 6px;
        overflow: hidden;
      }
      .learn-col-header {
        padding: 8px 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
        letter-spacing: 0.05em;
      }
      .lh-j { background: rgba(247,140,108,0.15); color: #c4622a; border-bottom: 1px solid rgba(247,140,108,0.3); }
      .lh-c { background: rgba(130,170,255,0.15); color: #2d5aaa; border-bottom: 1px solid rgba(130,170,255,0.3); }
      .lh-p { background: rgba(195,232,141,0.15); color: #3a6a20; border-bottom: 1px solid rgba(195,232,141,0.3); }
      .learn-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        text-decoration: none;
        color: var(--ink);
        border-bottom: 1px solid rgba(200,184,154,0.3);
        transition: background 0.12s;
      }
      .learn-item:last-child { border-bottom: none; }
      .learn-item:hover { background: rgba(255,255,255,0.85); }
      .learn-num {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: #a09070;
        flex-shrink: 0;
      }
      .learn-title {
        flex: 1;
        font-family: "Noto Serif KR", serif;
        font-size: 12px;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .learn-arrow {
        color: #c8b89a;
        font-size: 14px;
        flex-shrink: 0;
      }
      .learn-empty {
        padding: 16px 14px;
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: #b0a090;
        text-align: center;
      }

      @keyframes fadeSlide {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── 반응형 ── */
      @media (max-width: 640px) {
        .page { padding: 40px 16px; }
        .page::before { display: none; }
        .header, .stats-row, .controls, .list-header, .problem-list, .learning-section, .footer {
          padding-left: 0;
        }
        .p-lang-badge { display: none; }
        .learning-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="page">

      <!-- 헤더 -->
      <div class="header">
        <div class="label">Engineer Information Processing · Problem Archive</div>
        <h1>정보처리기사 알고리즘 풀이 노트</h1>
        <div class="meta" id="headerMeta">로딩 중…</div>
      </div>

      <!-- 통계 -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="s-num" id="statTotal">0</div>
          <div class="s-label">전체 문제</div>
        </div>
        <div class="stat-card clickable" data-lang="J" onclick="filterByLang('J')" title="Java 문제만 보기">
          <div class="s-num" id="statJava">0</div>
          <div class="s-label">Java</div>
        </div>
        <div class="stat-card clickable" data-lang="C" onclick="filterByLang('C')" title="C언어 문제만 보기">
          <div class="s-num" id="statC">0</div>
          <div class="s-label">C언어</div>
        </div>
        <div class="stat-card clickable" data-lang="P" onclick="filterByLang('P')" title="Python 문제만 보기">
          <div class="s-num" id="statPython">0</div>
          <div class="s-label">Python</div>
        </div>
        <div class="stat-card">
          <div class="s-num" id="statYears">0</div>
          <div class="s-label">연도 수</div>
        </div>
        <div class="stat-card">
          <div class="s-num" id="statRounds">0</div>
          <div class="s-label">회차 수</div>
        </div>
      </div>

      <!-- 학습 자료 -->
      <div class="learning-section">
        <div class="learning-header">📚 언어별 학습 자료</div>
        <div class="learning-grid" id="learningGrid"></div>
      </div>

      <!-- 컨트롤 -->
      <div class="controls">
        <!-- 탭 -->
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="newest" onclick="setTab('newest')">최신순</button>
          <button class="tab-btn" data-tab="oldest" onclick="setTab('oldest')">과거순</button>
          <button class="tab-btn" data-tab="year" onclick="setTab('year')">연도별</button>
          <button class="tab-btn" data-tab="round" onclick="setTab('round')">회차별</button>
          <button class="tab-btn" data-tab="lang" onclick="setTab('lang')">언어별</button>
          <button class="tab-btn" data-tab="pnum" onclick="setTab('pnum')">문제번호순</button>
          <button class="tab-btn" data-tab="type" onclick="setTab('type')">유형별</button>
        </div>
        <!-- 검색 + 필터 -->
        <div class="filter-row">
          <input
            class="search-box"
            id="searchInput"
            type="text"
            placeholder="파일명, 연도, 회차, 번호 검색…"
            oninput="renderList()"
          />
          <select class="filter-select" id="filterYear" onchange="renderList()">
            <option value="">전체 연도</option>
          </select>
          <select class="filter-select" id="filterRound" onchange="renderList()">
            <option value="">전체 회차</option>
          </select>
          <select class="filter-select" id="filterLang" onchange="syncLangCards(); renderList()">
            <option value="">전체 언어</option>
            <option value="J">Java</option>
            <option value="C">C언어</option>
            <option value="P">Python</option>
          </select>
          <select class="filter-select" id="filterType" onchange="renderList()">
            <option value="">전체 유형</option>
            <option value="programming">프로그래밍</option>
            <option value="essay">서술형</option>
            <option value="short">단답형</option>
          </select>
          <button class="btn-random" onclick="goRandom()">🎲 랜덤 문제</button>
        </div>
      </div>

      <!-- 목록 헤더 -->
      <div class="list-header">
        <span id="listCount">0개 문제</span>
        <span id="listSort"></span>
      </div>

      <!-- 문제 목록 -->
      <div class="problem-list" id="problemList"></div>

      <!-- 푸터 -->
      <div class="footer">
        <span id="footerNote">정보처리기사 실기 · 프로그래밍 출력값 추적 문제 모음</span>
      </div>
    </div>

    <script src="problems.js"></script>
    <script>
    // PROBLEMS 배열은 problems.js 에서 로드됩니다.

    // ── 표시용 레이블 ──
    const LANG_LABEL = { J: "Java", C: "C", P: "Python", essay: "서술형", short: "단답형" };
    const TYPE_LABEL = { programming: "프로그래밍", essay: "서술형", short: "단답형" };
    const LANG_BADGE_CLASS = { J: "badge-j", C: "badge-c", P: "badge-p", essay: "badge-essay", short: "badge-short" };
    const LANG_ITEM_CLASS  = { J: "lang-j", C: "lang-c", P: "lang-p", essay: "lang-essay", short: "lang-short" };
    const TYPE_CLASS = { programming: "type-programming", essay: "type-essay", short: "type-short" };

    // ── 언어 필터 단축키 (통계 카드 클릭) ──
    function filterByLang(lang) {
      const sel = document.getElementById("filterLang");
      // 이미 같은 언어면 해제, 아니면 설정
      sel.value = (sel.value === lang) ? "" : lang;
      syncLangCards();
      renderList();
    }

    // ── 언어 카드 active 상태 동기화 ──
    function syncLangCards() {
      const val = document.getElementById("filterLang").value;
      document.querySelectorAll(".stat-card[data-lang]").forEach(card => {
        card.classList.toggle("active", card.dataset.lang === val && val !== "");
      });
    }

    // ── 학습 자료 렌더 ──
    function renderLearning() {
      const LANG_ORDER  = ["J", "C", "P"];
      const LANG_NAMES  = { J: "Java", C: "C언어", P: "Python" };
      const HEADER_CLS  = { J: "lh-j", C: "lh-c", P: "lh-p" };

      document.getElementById("learningGrid").innerHTML = LANG_ORDER.map(lang => {
        const items = LEARNING.filter(l => l.lang === lang);
        const itemsHtml = items.length
          ? items.map(l => `
              <a class="learn-item" href="${l.file}">
                <span class="learn-num">#${String(l.num).padStart(2, "0")}</span>
                <span class="learn-title">${l.title}</span>
                <span class="learn-arrow">›</span>
              </a>`).join("")
          : `<div class="learn-empty">준비 중…</div>`;
        return `
          <div class="learn-col">
            <div class="learn-col-header ${HEADER_CLS[lang]}">${LANG_NAMES[lang]}</div>
            ${itemsHtml}
          </div>`;
      }).join("");
    }

    // ── 현재 탭 ──
    let currentTab = "newest";

    // ── 탭 설정 ──
    function setTab(tab) {
      currentTab = tab;
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
      renderList();
    }

    // ── 필터된 목록 반환 ──
    function getFiltered() {
      const q     = document.getElementById("searchInput").value.trim().toLowerCase();
      const fYear  = document.getElementById("filterYear").value;
      const fRound = document.getElementById("filterRound").value;
      const fLang  = document.getElementById("filterLang").value;
      const fType  = document.getElementById("filterType").value;

      return PROBLEMS.filter(p => {
        if (fYear  && String(p.year)  !== fYear)  return false;
        if (fRound && String(p.round) !== fRound) return false;
        if (fLang  && p.lang          !== fLang)  return false;
        if (fType  && p.type          !== fType)  return false;
        if (q) {
          const haystack = `${p.year} ${p.round}회차 ${p.num}번 ${LANG_LABEL[p.lang]} ${p.file}`.toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        return true;
      });
    }

    // ── 정렬 + 그룹핑 ──
    function sortAndGroup(list) {
      switch (currentTab) {
        case "newest":
          list = [...list].sort((a, b) => b.year - a.year || b.round - a.round || b.num - a.num);
          return [{ label: null, items: list }];

        case "oldest":
          list = [...list].sort((a, b) => a.year - b.year || a.round - b.round || a.num - b.num);
          return [{ label: null, items: list }];

        case "year": {
          list = [...list].sort((a, b) => b.year - a.year || b.round - a.round || a.num - b.num);
          const groups = {};
          list.forEach(p => { (groups[p.year] = groups[p.year] || []).push(p); });
          return Object.keys(groups).sort((a,b) => b-a).map(y => ({ label: `${y}년`, items: groups[y] }));
        }

        case "round": {
          list = [...list].sort((a, b) => b.year - a.year || a.round - b.round || a.num - b.num);
          const groups = {};
          list.forEach(p => {
            const k = `${p.year}년 제${p.round}회`;
            (groups[k] = groups[k] || []).push(p);
          });
          return Object.keys(groups).map(k => ({ label: k, items: groups[k] }));
        }

        case "lang": {
          const order = { J: 0, C: 1, P: 2, essay: 3, short: 4 };
          list = [...list].sort((a, b) => (order[a.lang]??9) - (order[b.lang]??9) || b.year - a.year || a.num - b.num);
          const groups = {};
          list.forEach(p => { const k = LANG_LABEL[p.lang]; (groups[k] = groups[k] || []).push(p); });
          return Object.keys(groups).map(k => ({ label: k, items: groups[k] }));
        }

        case "pnum":
          list = [...list].sort((a, b) => a.num - b.num || b.year - a.year || a.round - b.round);
          return [{ label: null, items: list }];

        case "type": {
          const typeOrder = { programming: 0, essay: 1, short: 2 };
          list = [...list].sort((a, b) => (typeOrder[a.type]??9) - (typeOrder[b.type]??9) || b.year - a.year || a.num - b.num);
          const groups = {};
          list.forEach(p => { const k = TYPE_LABEL[p.type]; (groups[k] = groups[k] || []).push(p); });
          return Object.keys(groups).map(k => ({ label: k, items: groups[k] }));
        }
      }
      return [{ label: null, items: list }];
    }

    // ── 문제 아이템 HTML 생성 ──
    function buildItem(p, idx, allItems) {
      const langLabel = LANG_LABEL[p.lang] || p.lang;
      const badgeCls  = LANG_BADGE_CLASS[p.lang] || "badge-j";
      const itemCls   = LANG_ITEM_CLASS[p.lang]  || "";
      const typeCls   = TYPE_CLASS[p.type] || "type-programming";
      const typeLabel = TYPE_LABEL[p.type] || p.type;

      // URL에 네비게이션 정보를 query string으로 전달
      const allFiles = allItems.map(x => x.file).join(",");
      const url = `viewer.html?file=${encodeURIComponent(p.file)}&list=${encodeURIComponent(allFiles)}&idx=${idx}`;

      return `
        <a class="problem-item ${itemCls}" href="${url}">
          <span class="p-num">#${String(idx+1).padStart(2,"0")}</span>
          <span class="p-lang-badge ${badgeCls}">${langLabel}</span>
          <span class="p-type-badge ${typeCls}">${typeLabel}</span>
          <div class="p-info">
            <div class="p-title">${p.year}년 제${p.round}회 실기 — ${p.num}번</div>
            <div class="p-subtitle">${p.file}</div>
          </div>
          <span class="p-meta">${p.year} · R${p.round} · Q${String(p.num).padStart(2,"0")}</span>
          <span class="p-arrow">›</span>
        </a>`;
    }

    // ── 목록 렌더 ──
    function renderList() {
      const filtered = getFiltered();
      const groups   = sortAndGroup(filtered);
      const container = document.getElementById("problemList");

      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state">조건에 맞는 문제가 없습니다.</div>`;
        document.getElementById("listCount").textContent = "0개 문제";
        return;
      }

      // 전체 순서 목록 (네비게이션용)
      const allItems = groups.flatMap(g => g.items);
      let html = "";
      let globalIdx = 0;

      groups.forEach(g => {
        if (g.label) {
          html += `<div class="group-header">${g.label} <span class="g-badge">${g.items.length}문제</span></div>`;
        }
        g.items.forEach(p => {
          html += buildItem(p, globalIdx, allItems);
          globalIdx++;
        });
      });

      container.innerHTML = html;
      document.getElementById("listCount").textContent = `${filtered.length}개 문제`;

      const tabLabels = {
        newest: "최신순", oldest: "과거순", year: "연도별",
        round: "회차별", lang: "언어별", pnum: "문제번호순", type: "유형별"
      };
      document.getElementById("listSort").textContent = tabLabels[currentTab] || "";
    }

    // ── 랜덤 문제 ──
    function goRandom() {
      const filtered = getFiltered();
      if (!filtered.length) return alert("조건에 맞는 문제가 없습니다.");
      const p = filtered[Math.floor(Math.random() * filtered.length)];
      const allFiles = filtered.map(x => x.file).join(",");
      const idx = filtered.indexOf(p);
      window.location.href = `viewer.html?file=${encodeURIComponent(p.file)}&list=${encodeURIComponent(allFiles)}&idx=${idx}&random=1`;
    }

    // ── 초기화: 필터 옵션 채우기 ──
    function initFilters() {
      const years  = [...new Set(PROBLEMS.map(p => p.year))].sort((a,b) => b-a);
      const rounds = [...new Set(PROBLEMS.map(p => p.round))].sort((a,b) => a-b);

      const ySelect = document.getElementById("filterYear");
      years.forEach(y => {
        const o = document.createElement("option");
        o.value = y; o.textContent = `${y}년`;
        ySelect.appendChild(o);
      });

      const rSelect = document.getElementById("filterRound");
      rounds.forEach(r => {
        const o = document.createElement("option");
        o.value = r; o.textContent = `제${r}회`;
        rSelect.appendChild(o);
      });
    }

    // ── 통계 업데이트 ──
    function updateStats() {
      document.getElementById("statTotal").textContent  = PROBLEMS.length;
      document.getElementById("statJava").textContent   = PROBLEMS.filter(p => p.lang === "J").length;
      document.getElementById("statC").textContent      = PROBLEMS.filter(p => p.lang === "C").length;
      document.getElementById("statPython").textContent = PROBLEMS.filter(p => p.lang === "P").length;
      const years  = new Set(PROBLEMS.map(p => p.year));
      const rounds = new Set(PROBLEMS.map(p => `${p.year}_${p.round}`));
      document.getElementById("statYears").textContent  = years.size;
      document.getElementById("statRounds").textContent = rounds.size;

      const minYear = Math.min(...years);
      const maxYear = Math.max(...years);
      document.getElementById("headerMeta").textContent =
        `${minYear}–${maxYear}년 · 총 ${PROBLEMS.length}문제 · Java / C / Python`;
    }

    // ── 부트스트랩 ──
    initFilters();
    updateStats();
    renderLearning();
    renderList();
    </script>
  </body>
</html>
